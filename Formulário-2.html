<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Cadastro</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 14px; }
        table { border-collapse: collapse; width: 800px; margin-bottom: 20px; }
        td { padding: 5px; border: 1px solid #ccc; }
        
        /* Regras da letra A */
        .header-azul-claro { background-color: lightblue; color: black; font-weight: bold; }
        .header-azul-escuro { background-color: darkblue; }
        
        .interesses { border: 1px solid #ccc; padding: 10px; width: 780px; }
        .interesses label { margin-right: 15px; }
    </style>
</head>
<body>

    <form action="#" method="post">
        <table>
            <tr>
                <td colspan="3" class="header-azul-claro">Não é associado? Faça seu cadastro</td>
                <td colspan="1" class="header-azul-escuro">&nbsp;</td>
            </tr>
            <tr>
                <td><label for="nome">Nome Completo</label></td>
                <td colspan="3"><input type="text" id="nome" name="nome" style="width: 98%;"></td>
            </tr>
            <tr>
                <td><label for="cpf">CPF</label></td>
                <td><input type="text" id="cpf" name="cpf"></td>
                <td><label for="email">E-mail</label></td>
                <td><input type="email" id="email" name="email" style="width: 95%;"></td>
            </tr>
            <tr>
                <td><label for="website">Web Site</label></td>
                <td colspan="3"><input type="url" id="website" name="website" style="width: 98%;"></td>
            </tr>
            <tr>
                <td><label for="endereco">Endereço</label></td>
                <td><input type="text" id="endereco" name="endereco" style="width: 95%;"></td>
                <td><label for="bairro">Bairro</label></td>
                <td><input type="text" id="bairro" name="bairro" style="width: 95%;"></td>
            </tr>
            <tr>
                <td><label for="cidade">Cidade</label></td>
                <td><input type="text" id="cidade" name="cidade" style="width: 95%;"></td>
                <td><label for="cep">Cep</label></td>
                <td>
                    <input type="text" id="cep" name="cep" size="10">
                    <label for="uf" style="margin-left: 10px;">UF</label>
                    <!-- Regra B: Siglas de todos os estados -->
                    <select id="uf" name="uf">
                        <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
                        <option value="AM">AM</option><option value="BA" selected>BA</option><option value="CE">CE</option>
                        <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
                        <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
                        <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
                        <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
                        <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
                        <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
                        <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="telefone">Telefone</label></td>
                <td><input type="tel" id="telefone" name="telefone"></td>
                <td><label for="fax">Fax</label></td>
                <td><input type="tel" id="fax" name="fax"></td>
            </tr>
            <tr>
                <td><label for="data_nasc">Data Nascimento</label></td>
                <td><input type="date" id="data_nasc" name="data_nasc"></td>
                <td><label>Sexo</label></td>
                <td>
                    <input type="radio" id="sexo_m" name="sexo" value="M"><label for="sexo_m">M</label>
                    <input type="radio" id="sexo_f" name="sexo" value="F"><label for="sexo_f">F</label>
                </td>
            </tr>
            <tr>
                <td><label for="celular">Celular</label></td>
                <td><input type="tel" id="celular" name="celular"></td>
                <td><label for="est_civil">Est. Civil</label></td>
                <td>
                    <!-- Regra C: Solteiro, Casado, Viúvo e Divorciado -->
                    <select id="est_civil" name="est_civil">
                        <option value="solteiro">Solteiro</option>
                        <option value="casado">Casado</option>
                        <option value="viuvo">Viúvo</option>
                        <option value="divorciado">Divorciado</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="login">Login</label></td>
                <td><input type="text" id="login" name="login"></td>
                <td><label for="senha">Senha</label></td>
                <!-- Regra D: Formato password -->
                <td><input type="password" id="senha" name="senha"></td>
            </tr>
        </table>

        <p>Deseja receber informações sobre os seguintes assuntos abaixo:</p>
        <div class="interesses">
            <input type="checkbox" id="tecnologia"><label for="tecnologia">Tecnologia</label>
            <input type="checkbox" id="esportes"><label for="esportes">Esportes</label>
            <input type="checkbox" id="automoveis"><label for="automoveis">Automóveis</label>
            <input type="checkbox" id="culinaria"><label for="culinaria">Culinária</label>
            <input type="checkbox" id="politica"><label for="politica">Política</label>
            <input type="checkbox" id="policial"><label for="policial">Policial</label>
            <input type="checkbox" id="tempo"><label for="tempo">Tempo</label><br><br>
            
            <input type="checkbox" id="cultura"><label for="cultura">Cultura</label>
            <input type="checkbox" id="economia"><label for="economia">Economia</label>
            <input type="checkbox" id="jogos"><label for="jogos">Jogos</label>
            <input type="checkbox" id="educacao"><label for="educacao">Educação</label>
            <input type="checkbox" id="viagem"><label for="viagem">Viagem</label>
            <input type="checkbox" id="empregos"><label for="empregos">Empregos</label>
            <input type="checkbox" id="moda"><label for="moda">Moda e Estilo</label>
        </div>

        <p>
            <input type="checkbox" id="regras" required>
            <label for="regras">Li as regras de cadastro e autorizo a criação do usuário</label>
        </p>

        <button type="submit">Confirmar</button>
        <button type="reset">Retornar</button>
    </form>

</body>
</html>
